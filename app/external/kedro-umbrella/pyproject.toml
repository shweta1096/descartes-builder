# PEP-518 https://peps.python.org/pep-0518/
[build-system]
# Minimum requirements for the build system to execute.
requires = ["setuptools>=65.5.1"]  # PEP 518 specifications
build-backend = "setuptools.build_meta"

[project]
name = "kedro-umbrella"
authors = [
    {name = "Kedro"}
]
description = "Kedro helps you build production-ready data and analytics pipelines"
requires-python = ">=3.7"
keywords = [
    "pipelines",
    "machine learning",
    "data pipelines",
    "data science",
    "data engineering",
]
license = {text = "Apache Software License (Apache 2.0)"}
classifiers = [
    "Development Status :: 4 - Beta",
    "Programming Language :: Python :: 3.7",
    "Programming Language :: Python :: 3.8",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
]
dynamic = ["readme", "version", "dependencies", "optional-dependencies"]

[project.urls]
Homepage = "https://kedro-umbrella.org"
Source = "https://github.com/kedro-umbrella-org/kedro"
Documentation = "https://docs.kedro-umbrella.org"
Tracker = "https://github.com/kedro_umbrella-org/kedro/issues"

[tool.setuptools]
zip-safe = false

[tool.setuptools.packages.find]
include = ["kedro_umbrella*"]

[tool.setuptools.dynamic]
readme = {file = "README.md", content-type = "text/markdown"}
version = {attr = "kedro_umbrella.__version__"}
dependencies = {file = "dependency/requirements.txt"}

[tool.black]
exclude = "/templates/|^features/steps/test_starter"

[tool.isort]
profile = "black"

[tool.pylint]
[tool.pylint.master]
ignore = "CVS"
ignore-patterns = "kedro_umbrella/templates/*"
load-plugins = [
    "pylint.extensions.docparams",
    "pylint.extensions.no_self_use"
]
extension-pkg-whitelist = "cv2"
unsafe-load-any-extension = false
[tool.pylint.messages_control]
disable = [
    "ungrouped-imports",
    "duplicate-code"
]
enable = ["useless-suppression"]
[tool.pylint.refactoring]
max-nested-blocks = 5
[tool.pylint.format]
indent-after-paren=4
indent-string="    "
[tool.pylint.miscellaneous]
notes = [
    "FIXME",
    "XXX"
]
[tool.pylint.design]
min-public-methods = 1

[tool.coverage.report]
#fail_under = 100
show_missing = true
omit = [
    "kedro_umbrella/templates/*",
    "kedro_umbrella/extras/logging/color_logger.py",
    "kedro_umbrella/extras/extensions/ipython.py",
    "kedro_umbrella/framework/cli/hooks/specs.py",
    "kedro_umbrella/framework/hooks/specs.py",
    "kedro_umbrella/extras/datasets/tensorflow/*",
    "kedro_umbrella/extras/datasets/holoviews/*",
    "tests/*"
]
exclude_lines = ["pragma: no cover", "raise NotImplementedError"]

[tool.pytest.ini_options]
addopts="""
--cov-config pyproject.toml \
--cov-report xml:coverage.xml \
--cov-report term-missing \
--cov kedro_umbrella \
--cov tests \
--ignore tests/template/fake_repo \
--ignore features \
--ignore kedro_umbrella/templates \
--no-cov-on-fail \
-ra \
-W ignore"""
testpaths = [
  "tests"
]

[tool.importlinter]
root_package = "kedro_umbrella"
